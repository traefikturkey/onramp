# Proxmox VE external service definitions
# Supports up to 10 Proxmox instances via environment variables.
# The primary instance uses PROXMOX_HOST_NAME and PROXMOX_ADDRESS.
# Additional instances use PROXMOX2_ through PROXMOX10_ prefixes.
# Only instances with a defined _ADDRESS variable are activated.
# Configure variables in: services-enabled/.env.external

http:
  routers:
    proxmox:
      entryPoints:
        - "websecure"
      rule: "Host(`{{env "PROXMOX_HOST_NAME"}}.{{env "HOST_DOMAIN"}}`)"
      middlewares:
        - default-headers
      tls: {}
      service: proxmox
{{if env "PROXMOX2_ADDRESS"}}
    proxmox2:
      entryPoints:
        - "websecure"
      rule: "Host(`{{env "PROXMOX2_HOST_NAME"}}.{{env "HOST_DOMAIN"}}`)"
