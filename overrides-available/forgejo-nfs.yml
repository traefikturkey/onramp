volumes:
  forgejo-nfs-data:
    labels:
      - remove_volume_on=down
    driver_opts:
      type: nfs
      o: "addr=${FORGEJO_DATA_NFS_SERVER:-${NFS_SERVER}},nolock,noatime,soft,rw"
      device: ":${FORGEJO_DATA_NFS_SERVER_PATH:-${NFS_MEDIA_PATH}}"

services:
  forgejo:
    volumes:
      - ${FORGEJO_DATA_VOLUME:-forgejo-nfs-data}:${FORGEJO_DATA_PATH:-/data}
      - /etc/localtime:/etc/localtime:ro
