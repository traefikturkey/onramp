networks:
  traefik:
    external: true

# config_version: 2
# description: Privacy-first, client-side PDF toolkit for editing, merging, and processing PDFs in the browser
# https://github.com/alam00000/bentopdf
# https://hub.docker.com/r/bentopdf/bentopdf-simple

services:
  bentopdf:
    # simple mode - bentopdf/bentopdf-simple (default)
    # full mode - bentopdf/bentopdf
    image: bentopdf/bentopdf-simple:${BENTOPDF_DOCKER_TAG:-latest}
    env_file:
      - ./services-enabled/bentopdf.env
    container_name: ${BENTOPDF_CONTAINER_NAME:-bentopdf}
    restart: ${BENTOPDF_RESTART:-unless-stopped}
    networks:
      - traefik
    volumes:
      - /etc/localtime:/etc/localtime:ro
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ}
    healthcheck:
      test: curl --fail http://localhost:8080 || exit 1
      interval: 60s
      retries: 5
      start_period: 20s
      timeout: 10s
    labels:
      - joyride.host.name=${BENTOPDF_HOST_NAME:-bentopdf}.${HOST_DOMAIN}
      - traefik.enable=${BENTOPDF_TRAEFIK_ENABLE:-true}
      - traefik.http.routers.bentopdf.entrypoints=websecure
      - traefik.http.routers.bentopdf.rule=Host(`${BENTOPDF_HOST_NAME:-bentopdf}.${HOST_DOMAIN}`)
      - traefik.http.services.bentopdf.loadbalancer.server.port=8080
      - com.centurylinklabs.watchtower.enable=${BENTOPDF_WATCHTOWER_ENABLE:-true}
      - autoheal=${BENTOPDF_AUTOHEAL:-true}
